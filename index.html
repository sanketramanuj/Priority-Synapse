<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Synapse AI Pro Max</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body,html{
margin:0;height:100%;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
font-family:sans-serif;color:white;overflow:hidden;
}

#matrix{display:flex;height:100vh;}

.quadrant{
flex:1;
display:flex;flex-direction:column;
background:rgba(255,255,255,0.05);
border-right:1px solid rgba(255,255,255,0.1);
}

.header{padding:6px;font-weight:bold;}

.action-item{
margin:6px;padding:8px;
border-radius:10px;
background:#1e1e1e;
position:relative;cursor:pointer;
}

.selected-item{
background:#0072ff;
border:2px solid white;
}

.delete-btn{
position:absolute;right:5px;top:5px;
color:red;cursor:pointer;
}

/* HUB */
#hub-container{
position:fixed;bottom:30px;left:50%;
transform:translateX(-50%);
}

#hub-trigger{
width:60px;height:60px;
border-radius:50%;
display:flex;align-items:center;justify-content:center;
font-size:28px;cursor:pointer;
}

#hub-menu{
display:flex;gap:8px;
opacity:0;transform:scale(0.6);
pointer-events:none;
transition:0.25s;
}

#hub-container.open #hub-menu{
opacity:1;transform:scale(1);
pointer-events:auto;
}

/* STATUS */
.synced{background:green;}
.syncing{background:gold;}
.offline{background:red;}
</style>
</head>

<body>

<div id="matrix"></div>

<div id="hub-container">
<div id="hub-menu">
<button onclick="addTask()">➕</button>
<button onclick="startVoice()">🎤</button>
<button onclick="deselectAll()">✕</button>
</div>
<div id="hub-trigger" onclick="toggleHub()">+</div>
</div>

<script>

/* ✅ SUPABASE */
const supabaseClient = supabase.createClient(
"https://hgskndwjgqdwbrabzlvp.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhnc2tuZHdqZ3Fkd2JyYWJ6bHZwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExNjg0ODEsImV4cCI6MjA5Njc0NDQ4MX0.sca542OMhMMrXkPHPUJYdzSMhNczMT1aTmVAfCg7qY4"
);

const quads=["q1","q2","q3","q4","q5","q6"];
const names=["DO","PLAN","OFFER","RC","VISIT","PERSONAL"];

let actions = JSON.parse(localStorage.getItem("synapse6"))||[];
let queue = JSON.parse(localStorage.getItem("syncQueue"))||[];

let selected=new Set();

/* ✅ NEW: LOAD + MERGE FROM DB */
async function loadFromDB(){

if(!navigator.onLine) return;

let { data, error } = await supabaseClient
.from("tasks")
.select("*");

if(error){
console.log("Fetch error", error);
return;
}

/* ✅ Merge instead of overwrite */
let map = new Map(actions.map(a => [a.id, a]));

for(let d of data){
map.set(d.id, d);
}

actions = Array.from(map.values());

save();
render();
updateStatus();
}

/* BUILD */
const matrix=document.getElementById("matrix");

quads.forEach((q,i)=>{
let col=document.createElement("div");
col.className="quadrant";
col.id=q;

col.innerHTML=`
<div class="header">${names[i]}</div>
<div id="list-${q}"></div>`;

matrix.appendChild(col);
});

/* SAVE */
function save(){
localStorage.setItem("synapse6",JSON.stringify(actions));
localStorage.setItem("syncQueue",JSON.stringify(queue));
}

/* STATUS */
function updateStatus(){
let hub=document.getElementById("hub-trigger");
hub.className="";

if(!navigator.onLine) hub.classList.add("offline");
else if(queue.length>0) hub.classList.add("syncing");
else hub.classList.add("synced");
}

/* ✅ ADD */
async function addTask(text){

let t=text || prompt("Task");
if(!t) return;

let task={id:Date.now(),text:t,quad:"q1"};
actions.push(task);
render(); save();

if(navigator.onLine){
let {error}=await supabaseClient.from("tasks").insert([task]);
if(error) queue.push({type:"add",data:task});
}else{
queue.push({type:"add",data:task});
}

save(); updateStatus();
}

/* ✅ DELETE WITH CONFIRM */
async function del(id){

let confirmDelete = confirm("Are you sure you want to delete this task?");
if(!confirmDelete) return;

actions = actions.filter(a=>a.id!==id);

render(); 
save();

if(navigator.onLine){
let {error} = await supabaseClient
.from("tasks")
.delete()
.eq("id", id);

if(error) queue.push({type:"delete",id});

}else{
queue.push({type:"delete",id});
}

save();
updateStatus();
}

/* ✅ DELETE MULTIPLE */
async function deleteSelected(){

if(selected.size===0) return;

let confirmDelete = confirm("Delete selected tasks?");
if(!confirmDelete) return;

for(let id of selected){
await del(id);
}

selected.clear();
render();
}

/* ✅ SYNC */
async function sync(){
if(!navigator.onLine) return;

for(let i=0;i<queue.length;i++){
let job=queue[i],err;

if(job.type==="add")
({error:err}=await supabaseClient.from("tasks").insert([job.data]));

if(job.type==="update")
({error:err}=await supabaseClient.from("tasks").update(job.data).eq("id",job.data.id));

if(job.type==="delete")
({error:err}=await supabaseClient.from("tasks").delete().eq("id",job.id));

if(!err){queue.splice(i,1);i--;} else break;
}

save(); updateStatus();
}

/* CLICK */
let clickState={}, clickTimer={};

function click(a){

clickState[a.id]=(clickState[a.id]||0)+1;

clearTimeout(clickTimer[a.id]);

clickTimer[a.id]=setTimeout(()=>{clickState[a.id]=0;},400);

if(clickState[a.id]===1) selected.add(a.id);
if(clickState[a.id]===2) selected.delete(a.id);

if(clickState[a.id]===3){

let t=prompt("Edit task",a.text);

if(t){
a.text=t;

if(navigator.onLine){
supabaseClient.from("tasks")
.update({text:a.text}).eq("id",a.id);
}else{
queue.push({type:"update",data:a});
}
save();
}

clickState[a.id]=0;
}

render();
updateStatus();
}

/* DRAG (UNCHANGED) */
function drag(el,task){

el.onpointerdown=(e)=>{
let sx=e.clientX, sy=e.clientY;
let dragging=false;

function move(ev){
if(!dragging &&
(Math.abs(ev.clientX-sx)>10 || Math.abs(ev.clientY-sy)>10)){
dragging=true;
if(selected.size===0) selected.add(task.id);
startDrag(ev);
}
}

function up(){
document.removeEventListener("pointermove",move);
document.removeEventListener("pointerup",up);
}

document.addEventListener("pointermove",move);
document.addEventListener("pointerup",up);
};

function startDrag(e){

let ghost=document.createElement("div");
ghost.className="action-item";
ghost.innerText="Moving...";
ghost.style.position="fixed";
ghost.style.pointerEvents="none";
document.body.appendChild(ghost);

document.onpointermove=(ev)=>{
ghost.style.left=ev.pageX+"px";
ghost.style.top=ev.pageY+"px";
};

document.onpointerup=async (ev)=>{

document.onpointermove=null;
document.onpointerup=null;

let q=document.elementFromPoint(ev.clientX,ev.clientY)?.closest(".quadrant");

if(q){
for(let a of actions){
if(selected.has(a.id)){
a.quad=q.id;

if(navigator.onLine){
let {error}=await supabaseClient.from("tasks")
.update({quad:a.quad}).eq("id",a.id);

if(error) queue.push({type:"update",data:a});
}else{
queue.push({type:"update",data:a});
}
}
}
}

ghost.remove();
selected.clear();
render(); save(); updateStatus();
};
}
}

/* RENDER */
function render(){

quads.forEach(q=>{
document.getElementById("list-"+q).innerHTML="";
});

actions.forEach(a=>{
let el=document.createElement("div");
el.className="action-item";

if(selected.has(a.id)) el.classList.add("selected-item");

el.innerHTML=`${a.text}<span class="delete-btn">✖</span>`;

el.onclick=(e)=>{
if(e.target.classList.contains("delete-btn")){
del(a.id); return;
}
click(a);
};

drag(el,a);

document.getElementById("list-"+a.quad).appendChild(el);
});
}

/* VOICE */
function startVoice(){
let Speech=window.SpeechRecognition||window.webkitSpeechRecognition;
if(!Speech){alert("Not supported");return;}

let rec=new Speech();
rec.lang="en-IN";

rec.onresult=(e)=>{
let t=e.results[0][0].transcript;
addTask(t);
};

rec.start();
}

/* SHORTCUTS */
document.addEventListener("keydown",(e)=>{
if(e.ctrlKey && e.key==="a"){e.preventDefault();addTask();}
if(e.ctrlKey && e.key==="v"){e.preventDefault();startVoice();}
if(e.key==="Delete"){deleteSelected();}
});

/* HUB */
function toggleHub(){
document.getElementById("hub-container").classList.toggle("open");
}

document.addEventListener("click",(e)=>{
if(!document.getElementById("hub-container").contains(e.target)){
document.getElementById("hub-container").classList.remove("open");
}
});

function deselectAll(){
selected.clear();
render();
}

/* ✅ INIT (UPDATED ONLY) */
render();
loadFromDB();   // ✅ get full DB
sync();         // ✅ push pending
updateStatus();

/* ✅ ONLINE EVENT */
window.ononline=()=>{
loadFromDB();
sync();
};

</script>

</body>
</html>
